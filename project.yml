name: Coincide
options:
  bundleIdPrefix: dev.bouncei
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""          # <-- set your Apple Developer Team ID here (or in Xcode)
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Coincide:
    type: application
    platform: macOS
    sources:
      - path: Coincide
      - path: CoincideKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.bouncei.Coincide
        PRODUCT_NAME: Coincide
        CODE_SIGN_ENTITLEMENTS: Coincide/Coincide.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Coincide
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Coincide shows your upcoming meetings across your time zones."
    dependencies:
      - target: CoincideWidget

  CoincideWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: CoincideWidget
      - path: CoincideKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.bouncei.Coincide.Widget
        PRODUCT_NAME: CoincideWidget
        INFOPLIST_FILE: CoincideWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: CoincideWidget/CoincideWidget.entitlements
        SKIP_INSTALL: YES

  CoincideKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CoincideKit
      - path: CoincideKitTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.bouncei.CoincideKitTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Coincide:
    build:
      targets:
        Coincide: all
        CoincideWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CoincideKitTests
    archive:
      config: Release
